<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>С Днём Рождения! ✨</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Great+Vibes&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Тот самый глубокий темный фон */
            background: #0f0c29;
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Подарок с неоновым свечением */
        .gift-box {
            font-size: 90px;
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.5));
            user-select: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .instruction {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Эффект матового стекла для карточки */
        #card {
            display: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            max-width: 90%;
            animation: slideUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            margin: 0 0 15px 0;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.9);
            margin: 10px 0;
        }

        .highlight {
            color: #ff85a2;
            font-weight: 600;
        }

        /* Летающие элементы */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="opener">
        <div class="gift-box" onclick="openSurprise()">🎁</div>
        <div class="instruction">Нажми на сюрприз</div>
    </div>

    <div id="card">
        <h1>С Днём Рождения!</h1>
        <p>Пусть этот день будет <span class="highlight">волшебным</span>, а каждый момент дарит искреннюю улыбку.</p>
        <p>Желаю тебе всегда сиять, открывать новые горизонты и просто быть <span class="highlight">самой счастливой</span>.</p>
        <p>Пусть мечты сбываются легко и красиво! ✨</p>
        <div style="font-size: 30px; margin-top: 20px; filter: drop-shadow(0 0 10px gold);">🌸⭐️🥂</div>
    </div>
</div>

<script>
    function openSurprise() {
        document.getElementById('opener').style.display = 'none';
        const card = document.getElementById('card');
        card.style.display = 'block';

        // Праздничный салют
        const count = 150;
        const defaults = { origin: { y: 0.6 } };

        function fire(particleRatio, opts) {
            confetti({
                ...defaults,
                ...opts,
                particleCount: Math.floor(count * particleRatio)
            });
        }

        fire(0.25, { spread: 30, startVelocity: 60 });
        fire(0.2, { spread: 60, colors: ['#ff85a2', '#ffffff'] });
        fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
        fire(0.1, { spread: 130, startVelocity: 30, colors: ['#ffd700'] });

        // Запуск сердечек
        setInterval(createHeart, 400);
    }

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        const types = ['❤️', '✨', '💖', '🌸']; // Разные символы для интереса
        heart.innerHTML = types[Math.floor(Math.random() * types.length)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.bottom = '-10vh';
        heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
        heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
        
        document.body.appendChild(heart);
        
        setTimeout(() => { heart.remove(); }, 4000);
    }
</script>

</body>
</html>
