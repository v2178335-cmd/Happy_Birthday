<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text x='0' y='16' font-size='16'>🥠</text></svg>" type="image/svg+xml">

    <title> Печенье с предсказанием</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fae8cf 0%, #f5d5ae 100%);
            font-family: 'Segoe UI', -apple-system, 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 550px;
            width: 100%;
            background: #fffef7;
            border-radius: 64px;
            padding: 25px 25px 30px;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.12);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 1.8rem;
            color: #b45f3b;
            font-weight: 500;
        }

        .sub {
            color: #d6976b;
            margin-top: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
		
        /* Счётчик */
        .counter {
            background: #fdf0e4;
            border-radius: 60px;
            padding: 8px 18px;
            display: inline-block;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #b45f3b;
            font-weight: 500;
        }

        .counter span {
            font-size: 1.3rem;
            font-weight: bold;
            color: #d67942;
        }
		
        .cookie-scene {
            position: relative;
            display: flex;
            justify-content: center;
            min-height: 200px;
            margin: 5px 0;
            cursor: pointer;
        }

        .cookie-whole {
            position: absolute;
            transition: opacity 0.2s ease;
            cursor: pointer;
            z-index: 30;
        }
        .cookie-whole img {
            width: 140px;
            height: auto;
            display: block;
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.1));
        }

        .cookie-half {
            position: absolute;
            transition: all 0.5s cubic-bezier(0.34, 1.2, 0.55, 1);
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            z-index: 10;
        }

        .cookie-half img {
            width: 140px;
			margin: 35px 0;
            height: auto;
            display: block;
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.1));
        }

        .cookie-half-left {
            left: 50%;
            transform: translateX(-50%);
        }

        .cookie-half-right {
            left: 50%;
            transform: translateX(-50%);
        }

        .note {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 220px;
            background: #fff8e7;
            border-radius: 20px;
            padding: 18px 15px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.55, 1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border: 1px solid #f5e0c8;
            z-index: 20;
            text-align: center;
            pointer-events: none;
        }

        .note-emoji {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .note-text {
            font-size: 0.9rem;
            line-height: 1.45;
            color: #7a4a2a;
            font-weight: 500;
        }

        .cookie-scene.cracked .cookie-whole {
            opacity: 0;
            visibility: hidden;
        }

        .cookie-scene.cracked .cookie-half {
            opacity: 1;
            visibility: visible;
        }

        .cookie-scene.cracked .cookie-half-left {
            transform: translateX(-130%) rotate(-15deg);
        }

        .cookie-scene.cracked .cookie-half-right {
            transform: translateX(30%) rotate(15deg);
        }

        .cookie-scene.cracked .note {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .reset-btn {
            background: rgba(180, 95, 59, 0.08);
            border: 1px solid #e7c8ae;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 0.75rem;
            color: #b45f3b;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            font-weight: 500;
        }

        .reset-btn:hover {
            background: rgba(180, 95, 59, 0.15);
            transform: scale(0.97);
        }

        .hint {
            font-size: 0.7rem;
            color: #c9946c;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        footer {
            font-size: 0.65rem;
            color: #dbbc9b;
            margin-top: 15px;
        }

        .name-highlight {
            color: #d67942;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>С днём рождения!🎂</h1>
	
    <div class="sub">
        <span class="name-highlight"> </span>
    </div>
	
    <div class="counter">
        Осталось печенек: <span id="counter">20</span>
    </div>
    
    <div class="hint" id="hintText">👇 нажми на печенье 👇</div>
    
    <div class="cookie-scene" id="cookieScene">
        <div class="cookie-whole" id="cookieWhole">
            <img src="cookie-whole.png" alt="целое печенье">
        </div>
        
        <div class="cookie-half cookie-half-left" id="cookieLeft">
            <img src="cookie-left.png" alt="левая половинка">
        </div>
        
        <div class="cookie-half cookie-half-right" id="cookieRight">
            <img src="cookie-right.png" alt="правая половинка">
        </div>

        <div class="note" id="note">
            <div class="note-emoji">📜✨</div>
            <div class="note-text" id="noteText">
                Здесь будет пожелание
            </div>
        </div>
    </div>

    <button class="reset-btn" id="resetBtn" style="display: none;">🎲 новое печенье 🎲</button>
    
    <div id="finalMessage" style="display: none;" class="final-message">
        🎉 Поздравляю! Ты открыла все печеньки! 🎉<br>
        Желаю тебе, чтобы все предсказания сбылись ✨
    </div>

</div>

<script>
    const scene = document.getElementById('cookieScene');
    const noteText = document.getElementById('noteText');
    const resetBtn = document.getElementById('resetBtn');
    const hintText = document.getElementById('hintText');
    const counterSpan = document.getElementById('counter');
    const finalMessageDiv = document.getElementById('finalMessage');

    const allWishes = [
        "🍀 Желаю, чтобы удача сама находила тебя — даже там, где ты её не ждёшь",
        "🎈 Желаю тебе легкости — в мыслях, в делах, в сердце",
        "✨ Пусть в твоей жизни будет чуть больше волшебства — хотя бы иногда",
        "🍃 Желаю тебе спокойствия, как в тихом лесу, и энергии, как в горном ручье",
        "🌟 Пусть твои желания сбываются не тогда, когда «надо», а когда «очень хочется»",
        "💫 Желаю тебе дней, которые хочется пересматривать как любимый фильм",
        "🌸 Пусть в твоей жизни будет больше «почему бы и нет?» и меньше «а вдруг не получится»",
        "🎵 Желаю тебе таких дней, под которые хочется танцевать",
        "⭐ Пусть у тебя всегда будет повод улыбнуться — даже самый маленький",
        "🕊️ Желаю тебе внутреннего покоя и уверенности, что всё будет хорошо",
        "🌈 Пусть жизнь удивляет тебя только приятными сюрпризами",
        "💭 Желаю тебе больше моментов, о которых потом вспоминаешь с теплом",
        "🌙 Пусть твои сны будут добрыми, а утра — лёгкими",
        "☁️ Желаю тебе иногда ничего не делать — и получать от этого удовольствие",
        "🕰️ Пусть у тебя всегда будет время на то, что делает тебя счастливой",
        "🌊 Желаю тебе смелости пробовать новое и мудрости отпускать лишнее",
        "🎉 Пусть жизнь говорит тебе «да» чаще, чем «нет»"
    ];

    let remainingWishes = [...allWishes];
    let isCracked = false;
    let animationLock = false; 

    function updateCounter() {
        counterSpan.textContent = remainingWishes.length;
        
        if (remainingWishes.length === 0) {
            finalMessageDiv.style.display = 'block';
            resetBtn.textContent = '🔄 начать заново 🔄';
        } else {
            finalMessageDiv.style.display = 'none';
            resetBtn.textContent = '🎲 новое печенье 🎲';
        }
    }

    function getRandomWish() {
        if (remainingWishes.length === 0) return null;
        const randomIndex = Math.floor(Math.random() * remainingWishes.length);
        const wish = remainingWishes[randomIndex];
        remainingWishes.splice(randomIndex, 1);
        return wish;
    }

    function crackCookie() {
        if (isCracked || animationLock) return;
        
        if (remainingWishes.length === 0) {
            hintText.textContent = '🎉 Все печеньки уже открыты! 🎉';
            return;
        }
        
        isCracked = true;
        animationLock = true;

        scene.classList.add('cracked');
        
        const wish = getRandomWish();
        noteText.textContent = wish;
        
        updateCounter();
        
        hintText.textContent = '🍪 печенье разломилось! 🍪';
        resetBtn.style.display = 'inline-block';
        
        if (navigator.vibrate) navigator.vibrate(50);
        
        setTimeout(() => {
            animationLock = false;
        }, 600);
    }

    function resetCookie() {
        if (animationLock) return;
        
        if (remainingWishes.length === 0) {
            remainingWishes = [...allWishes];
            updateCounter();
        }
        
        isCracked = false;
        scene.classList.remove('cracked');
        hintText.textContent = '👇 нажми на печенье 👇';
        
        setTimeout(() => {
            noteText.textContent = 'Здесь будет пожелание';
        }, 300);
    }

    scene.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!isCracked && !animationLock) {
            crackCookie();
        }
    });

    resetBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        resetCookie();
    });

    updateCounter();
</script>
</body>
</html>
